services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socialmediapod-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
